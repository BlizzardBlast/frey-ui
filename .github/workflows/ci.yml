name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: "10.33.0"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22.22.2
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run affected-package checks
        run: pnpm turbo run lint typecheck test build --affected
      - name: Install Playwright Browsers with OS dependencies
        run: pnpm --filter @frey-ui/playwright exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm turbo run test:e2e
      - name: Run Storybook API docs coverage check
        run: pnpm docs:check
